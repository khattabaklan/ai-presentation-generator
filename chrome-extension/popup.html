<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e4e4e7;
      padding: 20px;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #fff;
    }
    .subtitle {
      font-size: 12px;
      color: #a1a1aa;
      margin-bottom: 16px;
    }
    .status {
      background: #1a1b23;
      border: 1px solid #27272a;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
      font-size: 13px;
    }
    .status.success { border-color: #22c55e; color: #22c55e; }
    .status.error { border-color: #ef4444; color: #ef4444; }
    .status.syncing { border-color: #6366f1; color: #a5b4fc; }
    .status .detail { color: #a1a1aa; margin-top: 4px; font-size: 12px; }
    #sync-btn {
      width: 100%;
      padding: 10px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    #sync-btn:hover { background: #4f46e5; }
    #sync-btn:disabled { background: #3f3f46; cursor: not-allowed; color: #71717a; }
    .cancel {
      width: 100%;
      padding: 10px;
      background: transparent;
      color: #ef4444;
      border: 1px solid #ef4444;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .cancel:hover { background: rgba(239, 68, 68, 0.1); }
    .not-brightspace {
      text-align: center;
      padding: 20px 0;
      color: #a1a1aa;
      font-size: 13px;
    }
    .not-brightspace strong { color: #e4e4e7; display: block; margin-bottom: 8px; }
    .progress-bar {
      width: 100%;
      height: 4px;
      background: #27272a;
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #6366f1;
      border-radius: 2px;
      transition: width 0.3s;
    }
    .link {
      display: block;
      text-align: center;
      margin-top: 12px;
      color: #6366f1;
      text-decoration: none;
      font-size: 12px;
    }
    .link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Academic Assistant</h1>
  <p class="subtitle">Brightspace Assignment Sync</p>

  <div id="content"></div>

  <a href="https://khattabaklan.github.io/ai-presentation-generator/tracker.html" target="_blank" class="link">Open Assignment Tracker</a>

  <script src="popup.js"></script>
</body>
</html>

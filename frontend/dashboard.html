<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Academic Assistant</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar-brand">academic assistant</a>
      <ul class="navbar-links" id="nav-links"></ul>
    </div>
  </nav>

  <div class="container dashboard-page">
    <div class="dashboard-header">
      <h1>Dashboard</h1>
      <span id="user-info" style="color: var(--text-secondary);"></span>
    </div>

    <div class="stats-row" id="stats-row">
      <div class="card stat-card">
        <div class="value">—</div>
        <div class="label">Loading...</div>
      </div>
    </div>

    <div class="card">
      <h2 style="margin-bottom: 16px;">Generation History</h2>

      <div id="empty-state" class="hidden text-center" style="padding: 40px;">
        <p style="color: var(--text-secondary); margin-bottom: 16px;">No generations yet.</p>
        <a href="tracker.html" class="btn btn-primary">Go to Assignment Tracker</a>
      </div>

      <table class="history-table" id="history-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Type</th>
            <th>Status</th>
            <th>Date</th>
            <th>Download</th>
          </tr>
        </thead>
        <tbody id="history-body"></tbody>
      </table>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <p>Academic Command Center &copy; 2026. Powered by Claude AI.</p>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>

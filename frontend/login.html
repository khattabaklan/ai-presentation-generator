<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Academic Assistant</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar-brand">academic assistant</a>
      <ul class="navbar-links" id="nav-links"></ul>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card card">
      <h1>Welcome Back</h1>
      <p class="subtitle">Log in to get AI help with your assignments.</p>

      <div id="error-alert" class="alert alert-error hidden"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@university.edu" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Your password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;" id="submit-btn">Log In</button>
      </form>

      <p class="footer">Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    auth.redirectIfLoggedIn();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorAlert = document.getElementById('error-alert');
      const submitBtn = document.getElementById('submit-btn');
      errorAlert.classList.add('hidden');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Logging in...';

      try {
        const data = await api.login(email, password);
        api.setToken(data.token);
        api.setUser(data.user);
        window.location.href = 'app.html';
      } catch (err) {
        errorAlert.textContent = err.message;
        errorAlert.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Log In';
      }
    });
  </script>
</body>
</html>

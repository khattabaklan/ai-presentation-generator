<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Academic Assistant</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar-brand">academic assistant</a>
      <ul class="navbar-links" id="nav-links"></ul>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card card">
      <h1>Create Account</h1>
      <p class="subtitle">Your first generation is free.</p>

      <div id="error-alert" class="alert alert-error hidden"></div>

      <form id="signup-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@university.edu" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="At least 8 characters" minlength="8" required>
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" placeholder="Confirm your password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;" id="submit-btn">Create Account</button>
      </form>

      <p class="footer">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    auth.redirectIfLoggedIn();

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorAlert = document.getElementById('error-alert');
      const submitBtn = document.getElementById('submit-btn');
      errorAlert.classList.add('hidden');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm-password').value;

      if (password !== confirm) {
        errorAlert.textContent = 'Passwords do not match.';
        errorAlert.classList.remove('hidden');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account...';

      try {
        const data = await api.signup(email, password);
        api.setToken(data.token);
        api.setUser(data.user);
        window.location.href = 'app.html';
      } catch (err) {
        errorAlert.textContent = err.message;
        errorAlert.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
